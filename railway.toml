[build]
builder = "NIXPACKS"
buildCommand = "cd apps/backend && npm install --include=dev && npm run build"

[deploy]
startCommand = "cd apps/backend && npm run migrate && npm run seed; npm run start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
